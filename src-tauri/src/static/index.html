<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Products</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f11;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: #fff; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: #a1a1aa; }

    .container { max-width: 860px; margin: 0 auto; }

    /* ── Table ── */
    .table-wrap {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      overflow-x: auto;
      margin-bottom: 2rem;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #1f1f23; }
    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
    }

    tbody tr { border-top: 1px solid #27272a; transition: background 0.15s; }
    tbody tr:hover { background: #1f1f23; }

    td { padding: 0.75rem 1rem; font-size: 0.875rem; vertical-align: middle; }

    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .pill-active   { background: #14532d; color: #4ade80; }
    .pill-inactive { background: #450a0a; color: #f87171; }

    .btn-icon {
      background: none;
      border: 1px solid #3f3f46;
      border-radius: 0.4rem;
      color: #a1a1aa;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.85rem;
      transition: background 0.15s, color 0.15s;
      margin-left: 4px;
    }
    .btn-icon:hover { background: #27272a; color: #fff; }
    .btn-icon.danger:hover { background: #450a0a; border-color: #7f1d1d; color: #f87171; }

    .empty-row td { text-align: center; color: #52525b; padding: 2rem; }

    /* ── Form ── */
    .form-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      padding: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field.full { grid-column: 1 / -1; }

    label { font-size: 0.75rem; color: #71717a; font-weight: 500; }

    input, select {
      background: #09090b;
      border: 1px solid #3f3f46;
      border-radius: 0.4rem;
      color: #e4e4e7;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #6366f1; }
    input.error { border-color: #f87171; }

    .error-msg { font-size: 0.7rem; color: #f87171; min-height: 1em; }

    .form-footer {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #a1a1aa;
      cursor: pointer;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 0.4rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-secondary { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; }

    #status, #user-status {
      font-size: 0.8rem;
      color: #a1a1aa;
      margin-left: auto;
    }
    #status.ok, #user-status.ok  { color: #4ade80; }
    #status.err, #user-status.err { color: #f87171; }

    /* ── Orders ── */
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 2.5rem 0 1.25rem;
      color: #fff;
    }

    .filter-bar {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .orders-summary {
      margin-left: auto;
      font-size: 0.82rem;
      color: #a1a1aa;
      white-space: nowrap;
    }
    .orders-summary strong { color: #e4e4e7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Products Admin</h1>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="product-rows">
          <tr class="empty-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="form-card">
      <h2 id="form-title">Add Product</h2>
      <input type="hidden" id="edit-id" value="" />

      <div class="form-grid">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" placeholder="e.g. Cola" />
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option>Drinks</option>
            <option>Snacks</option>
            <option>Food</option>
            <option>Drugs</option>
            <option>Questionable</option>
          </select>
        </div>
        <div class="field">
          <label for="price">Price (£)</label>
          <input id="price" placeholder="e.g. 1.50" inputmode="decimal" />
          <span class="error-msg" id="price-error"></span>
        </div>
      </div>

      <div class="form-footer">
        <label class="checkbox-label">
          <input type="checkbox" id="availability" checked />
          Available
        </label>
        <button class="btn btn-primary" onclick="submitForm()">Save</button>
        <button class="btn btn-secondary" id="cancel-btn" style="display:none" onclick="cancelEdit()">Cancel</button>
        <span id="status"></span>
      </div>
    </div>

    <h1 class="section-title">Users Admin</h1>


    <div class="filter-bar">
      <div class="field">
        <label for="user-search">Search users</label>
        <input type="text" id="user-search" placeholder="Search by name or leave blank to load all" />
      </div>
      <button class="btn btn-primary" onclick="loadUsers()">Search</button>
      <button class="btn btn-secondary" onclick="clearUserSearch()">Clear</button>
      <span class="orders-summary" id="users-summary"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tag ID</th>
            <th>Name</th>
            <th>Admin</th>
            <th>Balance</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-rows">
          <tr class="empty-row"><td colspan="6">Search users to see results.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="form-card">
      <h2 id="user-form-title">Create User</h2>
      <input type="hidden" id="user-edit-tag-id" value="" />
      <div class="form-grid">
        <div class="field">
          <label for="user-tag-id">Tag ID</label>
          <input id="user-tag-id" placeholder="e.g. 04a3b2c1" />
        </div>
        <div class="field">
          <label for="user-full-name">Full Name</label>
          <input id="user-full-name" placeholder="e.g. Jane Doe" />
        </div>
        <div class="field">
          <label for="user-balance">Balance (£)</label>
          <input id="user-balance" placeholder="e.g. 10.00" inputmode="decimal" />
        </div>
      </div>
      <div class="form-footer">
        <label class="checkbox-label">
          <input type="checkbox" id="user-is-admin" />
          Admin
        </label>
        <button class="btn btn-primary" id="user-submit-btn" onclick="submitUserForm()">Create user</button>
        <button class="btn btn-secondary" id="user-cancel-btn" style="display:none" onclick="cancelUserEdit()">Cancel</button>
        <span id="user-status"></span>
      </div>
    </div>


    <h1 class="section-title">Orders History</h1>

    <div class="filter-bar">
      <div class="field">
        <label for="start-date">From</label>
        <input type="date" id="start-date" />
      </div>
      <div class="field">
        <label for="end-date">To</label>
        <input type="date" id="end-date" />
      </div>
      <button class="btn btn-primary" onclick="loadOrders()">Filter</button>
      <button class="btn btn-secondary" onclick="clearOrderFilter()">Clear</button>
      <button class="btn btn-secondary" onclick="downloadCSV()" id="dl-btn" disabled>⬇ Download CSV</button>
      <span class="orders-summary" id="orders-summary"></span>
    </div>

    <div class="table-wrap" style="margin-bottom: 3rem">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Product</th>
            <th>Category</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Date &amp; Time</th>
          </tr>
        </thead>
        <tbody id="order-rows">
          <tr class="empty-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════ PRODUCTS ═══════════════════════════════ */
    let products = [];

    async function loadProducts() {
      try {
        const res = await fetch("/products");
        products = await res.json();
        renderTable();
      } catch (e) {
        setStatus("Failed to load products.", false);
      }
    }

    function renderTable() {
      const tbody = document.getElementById("product-rows");
      if (products.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No products yet.</td></tr>';
        return;
      }
      tbody.innerHTML = products.map(p => `
        <tr>
          <td style="color:#52525b">${p.product_id}</td>
          <td style="font-weight:600">${esc(p.product_name)}</td>
          <td>${esc(p.product_category)}</td>
          <td>£${p.product_price.toFixed(2)}</td>
          <td><span class="pill ${p.product_availability ? 'pill-active' : 'pill-inactive'}">${p.product_availability ? 'Active' : 'Hidden'}</span></td>
          <td>
            <button class="btn-icon" onclick="startEdit(${p.product_id})" title="Edit">✏️</button>
            <button class="btn-icon danger" onclick="deleteProduct(${p.product_id})" title="Delete">🗑</button>
          </td>
        </tr>
      `).join("");
    }

    function esc(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function validatePrice(val) {
      const n = parseFloat(val);
      if (val.trim() === "" || isNaN(n) || n < 0 || !/^\d+(\.\d{0,2})?$/.test(val.trim())) {
        return null;
      }
      return n;
    }

    function setStatus(msg, ok) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = ok ? "ok" : "err";
    }

    function startEdit(id) {
      const p = products.find(x => x.product_id === id);
      if (!p) return;
      document.getElementById("edit-id").value = id;
      document.getElementById("name").value = p.product_name;
      document.getElementById("category").value = p.product_category;
      document.getElementById("price").value = p.product_price.toFixed(2);
      document.getElementById("availability").checked = p.product_availability;
      document.getElementById("form-title").textContent = "Edit Product";
      document.getElementById("cancel-btn").style.display = "";
      document.getElementById("name").focus();
    }

    function cancelEdit() {
      document.getElementById("edit-id").value = "";
      document.getElementById("name").value = "";
      document.getElementById("category").value = "Drinks";
      document.getElementById("price").value = "";
      document.getElementById("price-error").textContent = "";
      document.getElementById("price").classList.remove("error");
      document.getElementById("availability").checked = true;
      document.getElementById("form-title").textContent = "Add Product";
      document.getElementById("cancel-btn").style.display = "none";
      document.getElementById("status").textContent = "";
    }

    async function submitForm() {
      const priceVal = document.getElementById("price").value;
      const price = validatePrice(priceVal);

      if (price === null) {
        document.getElementById("price").classList.add("error");
        document.getElementById("price-error").textContent = "Must be a valid positive number (e.g. 1.50)";
        return;
      }
      document.getElementById("price").classList.remove("error");
      document.getElementById("price-error").textContent = "";

      const body = {
        product_name: document.getElementById("name").value.trim(),
        product_category: document.getElementById("category").value,
        product_price: price,
        product_availability: document.getElementById("availability").checked,
      };

      if (!body.product_name) {
        setStatus("Name is required.", false);
        return;
      }

      const editId = document.getElementById("edit-id").value;

      try {
        if (editId) {
          await fetch(`/products/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          setStatus("Product updated.", true);
        } else {
          await fetch("/products", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          setStatus("Product added.", true);
        }
        cancelEdit();
        loadProducts();
      } catch (e) {
        setStatus(`Error: ${e}`, false);
      }
    }

    async function deleteProduct(id) {
      if (!confirm("Delete this product?")) return;
      try {
        await fetch(`/products/${id}`, { method: "DELETE" });
        setStatus("Product deleted.", true);
        loadProducts();
      } catch (e) {
        setStatus(`Error: ${e}`, false);
      }
    }

    /* ═══════════════════════════════ ORDERS ═════════════════════════════════ */
    let orders = [];

    async function loadOrders() {
      const start = document.getElementById("start-date").value;
      const end   = document.getElementById("end-date").value;
      const params = new URLSearchParams();
      if (start) params.set("start_date", start);
      if (end)   params.set("end_date",   end);
      const url = "/orders/detail" + (params.toString() ? "?" + params.toString() : "");

      document.getElementById("order-rows").innerHTML =
        '<tr class="empty-row"><td colspan="6">Loading…</td></tr>';
      try {
        const res = await fetch(url);
        orders = await res.json();
        renderOrders();
      } catch (e) {
        document.getElementById("order-rows").innerHTML =
          '<tr class="empty-row"><td colspan="6">Failed to load orders.</td></tr>';
      }
    }

    function renderOrders() {
      const tbody = document.getElementById("order-rows");
      const dlBtn = document.getElementById("dl-btn");
      const summary = document.getElementById("orders-summary");

      if (!orders.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No orders found.</td></tr>';
        summary.innerHTML = "";
        dlBtn.disabled = true;
        return;
      }

      const totalRevenue = orders.reduce((s, o) => s + o.price, 0);
      const totalQty     = orders.reduce((s, o) => s + o.quantity, 0);
      summary.innerHTML =
        `<strong>${orders.length}</strong> orders &nbsp;·&nbsp; ` +
        `<strong>${totalQty}</strong> items &nbsp;·&nbsp; ` +
        `<strong>£${totalRevenue.toFixed(2)}</strong> total`;
      dlBtn.disabled = false;

      tbody.innerHTML = orders.map(o => `
        <tr>
          <td style="color:#52525b">${o.order_id}</td>
          <td style="font-weight:600">${esc(o.product_name)}</td>
          <td>${esc(o.product_category)}</td>
          <td>${o.quantity}</td>
          <td>£${o.price.toFixed(2)}</td>
          <td style="color:#71717a; font-size:0.8rem">${esc(o.timestamp)}</td>
        </tr>
      `).join("");
    }

    function clearOrderFilter() {
      document.getElementById("start-date").value = "";
      document.getElementById("end-date").value = "";
      loadOrders();
    }

    function downloadCSV() {
      if (!orders.length) return;
      const header = ["Order ID", "Product", "Category", "Quantity", "Price (£)", "Timestamp"];
      const rows = orders.map(o => [
        o.order_id,
        `"${String(o.product_name).replace(/"/g, '""')}"`,
        `"${String(o.product_category).replace(/"/g, '""')}"`,
        o.quantity,
        o.price.toFixed(2),
        `"${o.timestamp}"`,
      ]);
      const csv = [header, ...rows].map(r => r.join(",")).join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      const now  = new Date().toISOString().slice(0, 10);
      a.href     = url;
      a.download = `orders_${now}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    /* ═══════════════════════════════ USERS ═════════════════════════════════ */
    let users = [];

    async function loadUsers() {
      const query = document.getElementById("user-search").value.trim();
      const searchValue = query === "" ? "%" : query;
      const encoded = encodeURIComponent(searchValue);
      const url = `/users/name/${encoded}`;

      const tbody = document.getElementById("user-rows");
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Searching…</td></tr>';
      try {
        const res = await fetch(url);
        users = await res.json();
        renderUsers();
      } catch (e) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Failed to load users.</td></tr>';
      }
    }

    function renderUsers() {
      const tbody = document.getElementById("user-rows");
      const summary = document.getElementById("users-summary");

      if (!users.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No users found.</td></tr>';
        summary.innerHTML = "";
        return;
      }

      summary.innerHTML = `<strong>${users.length}</strong> user${users.length === 1 ? "" : "s"}`;
      tbody.innerHTML = users.map(u => `
        <tr>
          <td style="color:#52525b">${u.user_id}</td>
          <td style="font-family:monospace; font-size:0.9rem;">${esc(u.tag_id)}</td>
          <td style="font-weight:600">${esc(u.full_name)}</td>
          <td><span class="pill ${u.is_admin ? 'pill-active' : 'pill-inactive'}">${u.is_admin ? 'Admin' : 'User'}</span></td>
          <td>£${u.balance.toFixed(2)}</td>
          <td>
            <button class="btn btn-secondary" onclick="startEditUser('${encodeURIComponent(u.tag_id)}')">Edit</button>
            <button class="btn btn-secondary" onclick="toggleAdmin('${encodeURIComponent(u.tag_id)}')">${u.is_admin ? 'Revoke admin' : 'Make admin'}</button>
            <button class="btn btn-secondary" onclick="deleteUser('${encodeURIComponent(u.tag_id)}')">Delete</button>
          </td>
        </tr>
      `).join("");
    }

    async function toggleAdmin(encodedTagId) {
      const tagId = decodeURIComponent(encodedTagId);
      const user = users.find(u => u.tag_id === tagId);
      if (!user) return;

      const updated = {
        tag_id: user.tag_id,
        full_name: user.full_name,
        is_admin: !user.is_admin,
        balance: user.balance,
      };

      try {
        const res = await fetch(`/users?tag_id=${encodeURIComponent(tagId)}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(updated),
        });
        if (!res.ok) {
          throw new Error(`Status ${res.status}`);
        }
        user.is_admin = !user.is_admin;
        renderUsers();
      } catch (e) {
        alert(`Failed to update admin status: ${e}`);
      }
    }

    async function deleteUser(encodedTagId) {
      const tagId = decodeURIComponent(encodedTagId);
      if (!confirm("Delete this user?")) return;

      try {
        const res = await fetch(`/users?tag_id=${encodeURIComponent(tagId)}`, {
          method: "DELETE",
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }
        loadUsers();
      } catch (e) {
        alert(`Failed to delete user: ${e}`);
      }
    }

    function startEditUser(encodedTagId) {
      const tagId = decodeURIComponent(encodedTagId);
      const user = users.find(u => u.tag_id === tagId);
      if (!user) return;

      document.getElementById("user-edit-tag-id").value = user.tag_id;
      document.getElementById("user-tag-id").value = user.tag_id;
      document.getElementById("user-tag-id").disabled = true;
      document.getElementById("user-full-name").value = user.full_name;
      document.getElementById("user-balance").value = user.balance.toFixed(2);
      document.getElementById("user-is-admin").checked = user.is_admin;
      document.getElementById("user-form-title").textContent = "Edit User";
      document.getElementById("user-submit-btn").textContent = "Save user";
      document.getElementById("user-cancel-btn").style.display = "";
      document.getElementById("user-status").textContent = "";
    }

    function cancelUserEdit() {
      document.getElementById("user-edit-tag-id").value = "";
      document.getElementById("user-tag-id").value = "";
      document.getElementById("user-tag-id").disabled = false;
      document.getElementById("user-full-name").value = "";
      document.getElementById("user-balance").value = "";
      document.getElementById("user-is-admin").checked = false;
      document.getElementById("user-form-title").textContent = "Create User";
      document.getElementById("user-submit-btn").textContent = "Create user";
      document.getElementById("user-cancel-btn").style.display = "none";
      document.getElementById("user-status").textContent = "";
    }

    async function submitUserForm() {
      const originalTagId = document.getElementById("user-edit-tag-id").value;
      const tagId = document.getElementById("user-tag-id").value.trim();
      const fullName = document.getElementById("user-full-name").value.trim();
      const balanceValue = document.getElementById("user-balance").value.trim();
      const isAdmin = document.getElementById("user-is-admin").checked;
      const statusEl = document.getElementById("user-status");

      statusEl.textContent = "";
      const balance = parseFloat(balanceValue || "0");
      if (!tagId || !fullName) {
        statusEl.textContent = "Tag ID and full name are required.";
        statusEl.className = "err";
        return;
      }
      if (balanceValue !== "" && (isNaN(balance) || balance < 0)) {
        statusEl.textContent = "Balance must be a positive number.";
        statusEl.className = "err";
        return;
      }

      const payload = {
        tag_id: tagId.toLowerCase(),
        full_name: fullName,
        is_admin: isAdmin,
        balance: isNaN(balance) ? 0 : balance,
      };

      try {
        const url = originalTagId
          ? `/users?tag_id=${encodeURIComponent(originalTagId)}`
          : "/users";
        const method = originalTagId ? "PUT" : "POST";
        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }
        statusEl.textContent = originalTagId ? "User updated." : "User created.";
        statusEl.className = "ok";
        cancelUserEdit();
        loadUsers();
      } catch (e) {
        statusEl.textContent = `Save failed: ${e}`;
        statusEl.className = "err";
      }
    }

    function clearUserSearch() {
      document.getElementById("user-search").value = "";
      loadUsers();
    }

    /* ═════════════════════════════ INIT ════════════════════════════════════ */
    loadProducts();
    loadOrders();
    loadUsers();
  </script>
</body>
</html>
